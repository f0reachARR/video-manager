          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunList"
    post:
      tags: [runs]
      operationId: createRun
      summary: Run 作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRunRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
