openapi: 3.1.0
info:
  title: Video Manager API
  version: 0.1.0
  description: |
    Robocon test-run video manager HTTP API.

    Phase 1 の主要リソース（masters / sessions / videos / runs / markers / search）を契約として定義する。
    実装は spec-devflow.md §4〜§9 の順に handler / service / UI を縦断で積む。

    ## 共通方針

    - JSON フィールド名は camelCase
    - ID は UUID 文字列
    - 時刻は ISO 8601 (RFC 3339) タイムスタンプ
    - 動画上の時間は秒単位（int = 整数秒、float = 小数秒）
    - リスト系は `{ data: [...], pagination: {...} }` のエンベロープ
    - ページングは cursor ベース (`?cursor=...&limit=...`)
    - エラーは `ErrorResponse` で統一

servers:
  - url: http://localhost:8080
    description: Local development
  - url: /
    description: Same-origin (production / docker)

security:
  - xUserId: []

tags:
  - name: health
    description: Liveness / readiness probes
  - name: users
    description: ユーザー（チームメンバー）
  - name: devices
    description: 撮影機材と時計オフセット
  - name: teams
    description: チーム（自チームおよび対戦相手）
  - name: robots
    description: ロボット（機体・バージョン）
  - name: scenarios
    description: 走行課題
  - name: tags
    description: 自由付与タグ
  - name: sessions
    description: 撮影セッション
  - name: videos
    description: 動画ファイルと再生
  - name: uploads
    description: tusd hook と署名 URL
  - name: runs
    description: 試走（Run）とマルチアングル紐付け
  - name: markers
    description: Run 単位の時刻つきコメント
  - name: search
    description: 横断検索
  - name: tournaments
    description: 大会 (Phase 2)
  - name: matches
    description: 試合 (Phase 2)
  - name: annotations
    description: Video 単位の永続描画 (Phase 2)
  - name: scouting-notes
    description: 対戦相手スカウティングノート (Phase 2、本文は Hocuspocus 経由)

paths:
  /health:
    get:
      tags: [health]
      operationId: getHealth
      security: []
      summary: Liveness probe
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /ready:
    get:
      tags: [health]
      operationId: getReady
      security: []
      summary: Readiness probe (依存先到達確認)
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Dependency not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/config:
    get:
      tags: [auth]
      operationId: authConfig
      security: []
      summary: SPA 用ログイン UI capability discovery
      description: |
        サーバ側でどのログイン方式が有効になっているかを返す。SPA は起動時に
        これを呼んで「OIDC のサインインボタンを出すか」「dev-bypass の picker
        を出すか」を判断する。認証不要。
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthConfig"

  /auth/login:
    get:
      tags: [auth]
      operationId: authLogin
      security: []
      summary: OIDC ログインを開始する
      description: |
        302 で IdP の authorization endpoint にリダイレクト。`return_to` クエリ
        パラメータで SPA 内の戻り先 path (`/` 始まり同一オリジン限定) を指定でき、
        callback 完了後に同じ path に戻される。HttpOnly な短期 state cookie が
        付与される。
      parameters:
        - name: return_to
          in: query
          required: false
          schema:
            type: string
            example: /videos
      responses:
        "302":
          description: Redirect to IdP
        "503":
          description: OIDC is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/callback:
    get:
      tags: [auth]
      operationId: authCallback
      security: []
      summary: OIDC IdP からのコールバック
      description: |
        state / nonce / PKCE を検証し、ID Token の sub をもとに既存ユーザを
        引くか、email 一致で既存ユーザにリンクするか、自動でユーザを作成する。
        成功時は HttpOnly セッション cookie を発行し、`/auth/login` で渡された
        `return_to` にリダイレクトする。
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to return_to
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      tags: [auth]
      operationId: authLogout
      summary: セッションを破棄する
      description: |
        セッション cookie を即時無効化する。IdP 側の RP-Initiated Logout は
        セルフホスト前提では基本不要なので呼ばない。
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      tags: [auth]
      operationId: authMe
      summary: 現在のログインユーザを返す
      description: |
        セッション cookie を検証して User を返す。未認証なら 401。SPA は起動時に
        これを呼んでログイン状態を判定する。
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ---------- Users ----------
  /users:
    get:
      tags: [users]
      operationId: listUsers
      summary: ユーザー一覧
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserList"
    post:
      tags: [users]
      operationId: createUser
      summary: ユーザー作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /users/{userId}:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      tags: [users]
      operationId: getUser
      summary: ユーザー取得
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [users]
      operationId: updateUser
      summary: ユーザー更新
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    delete:
      tags: [users]
      operationId: deleteUser
      summary: ユーザー削除
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------- Devices ----------
  /devices:
    get:
      tags: [devices]
      operationId: listDevices
      summary: 機材一覧
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceList"
    post:
      tags: [devices]
      operationId: createDevice
      summary: 機材作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeviceRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "400":
          $ref: "#/components/responses/BadRequest"

  /devices/{deviceId}:
    parameters:
      - $ref: "#/components/parameters/DeviceId"
    get:
      tags: [devices]
      operationId: getDevice
      summary: 機材取得
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [devices]
      operationId: updateDevice
      summary: 機材更新（時計オフセット含む）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDeviceRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [devices]
      operationId: deleteDevice
      summary: 機材削除
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------- Teams ----------
  /teams:
    get:
      tags: [teams]
      operationId: listTeams
      summary: チーム一覧
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamList"
    post:
      tags: [teams]
      operationId: createTeam
      summary: チーム作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "400":
          $ref: "#/components/responses/BadRequest"

  /teams/{teamId}:
    parameters:
      - $ref: "#/components/parameters/TeamId"
    get:
      tags: [teams]
      operationId: getTeam
      summary: チーム取得
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [teams]
      operationId: updateTeam
      summary: チーム更新
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeamRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [teams]
      operationId: deleteTeam
      summary: チーム削除
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /teams/{teamId}/marker-stats:
    parameters:
      - $ref: "#/components/parameters/TeamId"
    get:
      tags: [teams, markers]
      operationId: getTeamMarkerStats
      summary: チーム配下 Run の Marker カテゴリ別件数
      description: |
        対戦相手スカウト用。Phase 2 のマッチアップビューで使う。
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMarkerStats"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------- Robots ----------
  /robots:
    get:
      tags: [robots]
      operationId: listRobots
      summary: ロボット一覧
      parameters:
        - name: teamId
          in: query
          description: チームで絞り込む
          required: false
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RobotList"
    post:
      tags: [robots]
      operationId: createRobot
      summary: ロボット作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRobotRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Robot"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /robots/{robotId}:
    parameters:
      - $ref: "#/components/parameters/RobotId"
    get:
      tags: [robots]
      operationId: getRobot
      summary: ロボット取得
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Robot"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [robots]
      operationId: updateRobot
      summary: ロボット更新
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRobotRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Robot"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags: [robots]
      operationId: deleteRobot
      summary: ロボット削除
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------- Robot Images ----------
  /robots/{robotId}/images:
    parameters:
      - name: robotId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [robot-images]
      operationId: listRobotImages
      summary: ロボット画像一覧 (時系列順)
      parameters:
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: sort
          in: query
          schema: { type: string, enum: [asc, desc], default: asc }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RobotImageList" }
    post:
      tags: [robot-images]
      operationId: uploadRobotImages
      summary: 画像アップロード (複数可)
      description: |
        multipart/form-data。`file` パートを複数並べると一度に登録できる。
        各ファイルは独立に処理され、一部失敗時でもレスポンスの per-file
        `error` で結果が分かる。HEIC は JPEG に変換されて display として
        保存される。EXIF DateTimeOriginal がある場合は `capturedAt` に
        セットされる。
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                caption:
                  type: string
                  description: アップロードするすべての画像に同じキャプションを付与
      responses:
        "201":
          description: 少なくとも 1 件が成功
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RobotImageUploadResponse" }
        "400":
          description: 全ファイルが失敗、もしくはファイル無し
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RobotImageUploadResponse" }
        "413":
          description: リクエストサイズ超過
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /robots/{robotId}/primary-image:
    parameters:
      - name: robotId
        in: path
        required: true
        schema: { type: string, format: uuid }
    put:
      tags: [robot-images]
      operationId: setRobotPrimaryImage
      summary: primary 画像を切り替え
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                imageId:
                  type: [string, "null"]
                  format: uuid
      responses:
        "204": { description: OK }
        "404": { $ref: "#/components/responses/NotFound" }

  /robot-images/{imageId}:
    parameters:
      - name: imageId
        in: path
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [robot-images]
      operationId: updateRobotImage
      summary: キャプション / 撮影日時の更新
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateRobotImageRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RobotImage" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [robot-images]
      operationId: deleteRobotImage
      summary: 画像削除
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }
  /robot-images/{imageId}/raw:
    parameters:
      - name: imageId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [robot-images]
      operationId: getRobotImageRaw
      summary: 画像本体 (HEIC など browser 非対応の場合は JPEG 変換版)
      responses:
        "200":
          description: image bytes
          content:
            image/jpeg: { schema: { type: string, format: binary } }
            image/png:  { schema: { type: string, format: binary } }
            image/webp: { schema: { type: string, format: binary } }
        "404": { $ref: "#/components/responses/NotFound" }
  /robot-images/{imageId}/thumb:
    parameters:
      - name: imageId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [robot-images]
      operationId: getRobotImageThumb
      summary: サムネ JPEG (長辺 320px)
      responses:
        "200":
          description: thumb jpeg
          content:
            image/jpeg: { schema: { type: string, format: binary } }
        "404": { $ref: "#/components/responses/NotFound" }

  /runs/{runId}/robot-images:
    parameters:
      - name: runId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [robot-images]
      operationId: listRunRobotImages
      summary: Run の時間帯に撮影された同じロボットの画像
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RobotImageList" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ---------- Scenarios ----------
  /scenarios:
    get:
      tags: [scenarios]
      operationId: listScenarios
      summary: 課題一覧
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioList"
    post:
      tags: [scenarios]
      operationId: createScenario
      summary: 課題作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScenarioRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scenario"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /scenarios/{scenarioId}:
    parameters:
      - $ref: "#/components/parameters/ScenarioId"
    get:
      tags: [scenarios]
      operationId: getScenario
      summary: 課題取得
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scenario"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [scenarios]
      operationId: updateScenario
      summary: 課題更新
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScenarioRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scenario"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags: [scenarios]
      operationId: deleteScenario
      summary: 課題削除
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------- Tags ----------
  /tags:
    get:
      tags: [tags]
      operationId: listTags
      summary: タグ一覧
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagList"
    post:
      tags: [tags]
      operationId: createTag
      summary: タグ作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTagRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /tags/{tagId}:
    parameters:
      - $ref: "#/components/parameters/TagId"
    get:
      tags: [tags]
      operationId: getTag
      summary: タグ取得
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [tags]
      operationId: updateTag
      summary: タグ更新
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTagRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      tags: [tags]
      operationId: deleteTag
      summary: タグ削除
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------- Sessions ----------
  /sessions:
    get:
      tags: [sessions]
      operationId: listSessions
      summary: セッション一覧
      parameters:
        - name: modeHint
          in: query
          description: モードで絞り込む
          required: false
          schema:
            $ref: "#/components/schemas/SessionModeHint"
        - name: tournamentId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: startedFrom
          in: query
          description: 開始時刻の下限（含む）
          required: false
          schema:
            type: string
            format: date-time
        - name: startedTo
          in: query
          description: 開始時刻の上限（含む）
          required: false
          schema:
            type: string
            format: date-time
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionList"
    post:
      tags: [sessions]
      operationId: createSession
      summary: セッション作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          $ref: "#/components/responses/BadRequest"

  /sessions/{sessionId}:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    get:
      tags: [sessions]
      operationId: getSession
      summary: セッション取得
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [sessions]
      operationId: updateSession
      summary: セッション更新
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSessionRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [sessions]
      operationId: deleteSession
      summary: セッション削除
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /sessions/candidates:
    get:
      tags: [sessions]
      operationId: listSessionCandidates
      summary: Session 候補（録画時刻に基づくグルーピング提案）
      description: |
        アップロードされた未割当 Video の `recordedAt` から、既存 Session に
        30 分以内のギャップで近接するもの、または新規 Session 候補を返す。
        spec-devflow.md §6 で UI が確認ステップに使う。
      parameters:
        - name: videoId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionCandidateList"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------- Videos ----------
  /videos:
    get:
      tags: [videos]
      operationId: listVideos
      summary: 動画一覧
      parameters:
        - name: sessionId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: deviceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: unassigned
          in: query
          description: true なら sessionId が未設定の動画のみ
          required: false
          schema:
            type: boolean
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoList"

  /videos/{videoId}:
    parameters:
      - $ref: "#/components/parameters/VideoId"
    get:
      tags: [videos]
      operationId: getVideo
      summary: 動画取得
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [videos]
      operationId: updateVideo
      summary: 動画メタデータ更新（recorded_at / time_offset_sec / session 紐付け）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVideoRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [videos]
      operationId: deleteVideo
      summary: 動画削除（オブジェクトストレージのファイルも削除）
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /videos/{videoId}/playback-url:
    parameters:
      - $ref: "#/components/parameters/VideoId"
    get:
      tags: [videos]
      operationId: getVideoPlaybackUrl
      summary: 動画再生用の URL を発行
      description: |
        HLS が ready なら master.m3u8 を指す proxy URL (kind=hls) を返す。
        それ以外は元 MP4 の署名 URL (kind=mp4) を返す。
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaybackUrl"
        "404":
          $ref: "#/components/responses/NotFound"

  /videos/{videoId}/renditions:
    parameters:
      - $ref: "#/components/parameters/VideoId"
    get:
      tags: [videos]
      operationId: listVideoRenditions
      summary: 動画の HLS rendition 一覧
      description: |
        指定した動画の各バリアントの状態を返す。`status=encoding` のあいだは
        `segmentsDone` がエンコード進捗の目安になる（segments_done /
        ceil(duration_sec / 6) ≒ %）。
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoRenditionList"
        "404":
          $ref: "#/components/responses/NotFound"

  /encoding-jobs:
    get:
      tags: [videos]
      operationId: listEncodingJobs
      summary: HLS エンコード中・失敗した動画とその rendition 状態
      description: |
        ダッシュボード用。`hls_status` が `planning` / `encoding` / `failed` の
        動画と、それらの video_renditions 行をまとめて返す。新しいものが先頭。
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EncodingJobList"

  /videos/{videoId}/hls/{rest}:
    parameters:
      - $ref: "#/components/parameters/VideoId"
      - name: rest
        in: path
        required: true
        schema:
          type: string
        description: |
          master.m3u8 / {variant}/playlist.m3u8 / {variant}/seg-XXXXX.ts のいずれか。
          API サーバが MinIO から取得して中継する。署名 URL は使わず認証は API
          ミドルウェアに任せる。
    get:
      tags: [videos]
      operationId: getVideoHlsObject
      summary: HLS の master / variant playlist / segment を取得
      responses:
        "200":
          description: HLS object body (m3u8 or mpegts)
          content:
            application/vnd.apple.mpegurl: {}
            video/mp2t: {}
        "404":
          $ref: "#/components/responses/NotFound"

  /videos/{videoId}/annotations:
    parameters:
      - $ref: "#/components/parameters/VideoId"
    get:
      tags: [annotations]
      operationId: listAnnotations
      summary: Video の Annotation 一覧
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnotationList"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [annotations]
      operationId: createAnnotation
      summary: Annotation 作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnotationRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Annotation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "404":
          $ref: "#/components/responses/NotFound"

  /matches/{matchId}/scouting-notes:
    parameters:
      - $ref: "#/components/parameters/MatchIdPath"
    get:
      tags: [scouting-notes]
      operationId: listScoutingNotes
      summary: Match 配下の ScoutingNote 一覧
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoutingNoteList"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [scouting-notes]
      operationId: createScoutingNote
      summary: ScoutingNote を新規作成
      description: |
        本文は Hocuspocus が WS 経由で更新する。同じ (matchId, targetTeamId)
        の組が既に存在する場合は 409 を返す。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScoutingNoteRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoutingNote"
        "409":
          description: 既に存在する
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /scouting-notes/{noteId}:
    parameters:
      - $ref: "#/components/parameters/ScoutingNoteId"
    get:
      tags: [scouting-notes]
      operationId: getScoutingNote
      summary: ScoutingNote 取得 (メタデータ + plain_text のみ)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoutingNote"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [scouting-notes]
      operationId: deleteScoutingNote
      summary: ScoutingNote 削除
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /annotations/{annotationId}:
    parameters:
      - $ref: "#/components/parameters/AnnotationId"
    patch:
      tags: [annotations]
      operationId: updateAnnotation
      summary: Annotation 更新
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAnnotationRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Annotation"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [annotations]
      operationId: deleteAnnotation
      summary: Annotation 削除
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /videos/{videoId}/thumbnail-url:
    parameters:
      - $ref: "#/components/parameters/VideoId"
    get:
      tags: [videos]
      operationId: getVideoThumbnailUrl
      summary: サムネイル画像の署名 URL を発行
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaybackUrl"
        "404":
          description: サムネイル未生成 もしくは Video が存在しない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ---------- Uploads ----------
  /uploads/tus-hook:
    post:
