    parameters:
      - $ref: "#/components/parameters/RunId"
    get:
      tags: [runs]
      operationId: listRecommendedVideosForRun
      summary: Run に追加すべき動画のレコメンド
      description: 同じ Session にアップロード済みで、まだこの Run に紐付いていない動画を返す
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Video"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------- Markers ----------
  /runs/{runId}/markers:
    parameters:
      - $ref: "#/components/parameters/RunId"
    get:
      tags: [markers]
      operationId: listMarkers
      summary: Run の Marker 一覧
      parameters:
        - name: category
          in: query
          description: 複数指定可（カンマ区切り）
          required: false
          explode: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/MarkerCategory"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkerList"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [markers]
      operationId: createMarker
      summary: Marker 作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMarkerRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Marker"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /markers/{markerId}:
    parameters:
      - $ref: "#/components/parameters/MarkerId"
    get:
      tags: [markers]
      operationId: getMarker
      summary: Marker 取得 (marker_link 解決用)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Marker"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [markers]
      operationId: updateMarker
      summary: Marker 更新
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMarkerRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Marker"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [markers]
      operationId: deleteMarker
      summary: Marker 削除
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------- Search ----------
  /search/runs:
    get:
      tags: [search]
      operationId: searchRuns
      summary: Run の横断検索
      description: |
        spec-devflow.md §9 で扱う Phase 1 の検索条件。
        期間 / Robot / Scenario / tags / Marker category / memo の組合せで Run を絞り込む。
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: robotId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: scenarioId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: tagIds
          in: query
          description: タグ ID（カンマ区切り、AND 条件）
          required: false
          explode: false
          schema:
            type: array
            items:
              type: string
              format: uuid
        - name: markerCategories
          in: query
          description: 含まれている Marker のカテゴリ（カンマ区切り、OR 条件）
          required: false
          explode: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/MarkerCategory"
        - name: q
          in: query
          description: memo の全文検索（pg_trgm）
          required: false
          schema:
            type: string
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunList"

