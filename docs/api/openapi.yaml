            type: string
            format: uuid
        - name: teamId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: robotId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: scenarioId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: matchId
          in: query
