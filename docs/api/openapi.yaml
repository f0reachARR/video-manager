        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [runs]
      operationId: updateRun
      summary: Run 更新
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRunRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [runs]
      operationId: deleteRun
      summary: Run 削除
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /runs/{runId}/videos:
    parameters:
      - $ref: "#/components/parameters/RunId"
    post:
      tags: [runs]
      operationId: addRunVideo
      summary: Run にアングル動画を紐付ける
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddRunVideoRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunVideo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /runs/{runId}/videos/{runVideoId}:
    parameters:
      - $ref: "#/components/parameters/RunId"
      - $ref: "#/components/parameters/RunVideoId"
    patch:
      tags: [runs]
      operationId: updateRunVideo
      summary: アングル動画の offset / angle ラベル更新
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRunVideoRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunVideo"
        "404":
