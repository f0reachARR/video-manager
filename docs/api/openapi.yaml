      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [tournaments]
      operationId: deleteTournament
      summary: Tournament 削除
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /tournaments/{tournamentId}/teams:
    parameters:
      - $ref: "#/components/parameters/TournamentId"
    get:
      tags: [tournaments]
      operationId: listTournamentTeams
      summary: Tournament の参加チーム一覧
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentTeamList"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [tournaments]
      operationId: replaceTournamentTeams
      summary: Tournament の参加チームを置換
      description: |
        渡された teamIds の集合に置換する（存在しないものは削除、追加分は追加）。
        参加チームから外れたチーム配下の tournament_robots も同じトランザクションで削除する。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplaceTournamentTeamsRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentTeamList"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /tournaments/{tournamentId}/robots:
    parameters:
      - $ref: "#/components/parameters/TournamentId"
    get:
      tags: [tournaments]
      operationId: listTournamentRobots
      summary: Tournament の持ち込みロボット一覧
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentRobotList"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [tournaments]
      operationId: replaceTournamentRobots
      summary: Tournament の持ち込みロボットを置換
      description: |
        渡された robotIds の集合に置換する。各 robot の team_id が
        tournament_teams に居ない場合は 422 を返す。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplaceTournamentRobotsRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentRobotList"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  # ---------- Matches (Phase 2) ----------
  /matches:
    get:
      tags: [matches]
      operationId: listMatches
      summary: Match 一覧
      parameters:
        - name: tournamentId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchList"
    post:
      tags: [matches]
      operationId: createMatch
      summary: Match 作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMatchRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /matches/{matchId}:
    parameters:
      - $ref: "#/components/parameters/MatchIdPath"
    get:
      tags: [matches]
      operationId: getMatch
      summary: Match 取得
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [matches]
      operationId: updateMatch
      summary: Match 更新
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMatchRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [matches]
      operationId: deleteMatch
      summary: Match 削除
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    xUserId:
      type: apiKey
      in: header
      name: X-User-Id
      description: |
        現在ユーザーの UUID。セルフホスト・全員同権限の前提のため
        Phase 1 はクライアントが選択ユーザーを header で送る簡易方式。
        将来正式な認証を入れたら securityScheme を差し替える。

  parameters:
    Cursor:
      name: cursor
      in: query
      required: false
      description: 前回レスポンスの `pagination.nextCursor`
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      description: 1 レスポンスあたり最大件数（1〜200、既定 50）
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DeviceId:
      name: deviceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TeamId:
      name: teamId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RobotId:
      name: robotId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScenarioId:
      name: scenarioId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TagId:
      name: tagId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VideoId:
      name: videoId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunVideoId:
      name: runVideoId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MarkerId:
      name: markerId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TournamentId:
      name: tournamentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MatchIdPath:
      name: matchId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AnnotationId:
      name: annotationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScoutingNoteId:
      name: noteId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: リクエストが不正
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: リソースが存在しない
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: 認証が必要
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: 競合（重複や状態不一致）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnprocessableEntity:
      description: バリデーション失敗
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    # ---------- Common ----------
    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: 機械可読なエラーコード
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    Pagination:
      type: object
      required: [hasMore]
      properties:
        hasMore:
          type: boolean
        nextCursor:
          type: [string, "null"]
          description: 次ページを取得するための cursor

    # ---------- Enums ----------
    SessionModeHint:
      type: string
      enum: [practice, pre_match]
      description: Session の表示モードヒント

    MarkerCategory:
      type: string
      enum: [success, failure, note]
      description: Marker のカテゴリ。spec の `success | failure | note` を採用

    # ---------- User ----------
    AuthConfig:
      type: object
      required: [oidcEnabled, devBypassEnabled, loginUrl]
      properties:
        oidcEnabled:
          type: boolean
        devBypassEnabled:
          type: boolean
        loginUrl:
          type: string
          description: "/auth/login へのパス。OIDC が無効なら呼び出すと 503。"

    User:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: [string, "null"]
          description: UI 上の識別色（HEX 文字列）
        createdAt:
          type: string
          format: date-time
    CreateUserRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: [string, "null"]
    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: [string, "null"]
    UserList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # ---------- Device ----------
    Device:
      type: object
      required: [id, name, defaultTimeOffsetSec, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        defaultTimeOffsetSec:
          type: integer
          description: 機材の時計ズレ（秒）。プラスなら機材時刻が進んでいる
        createdAt:
          type: string
          format: date-time
    CreateDeviceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        defaultTimeOffsetSec:
          type: integer
          default: 0
    UpdateDeviceRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        defaultTimeOffsetSec:
          type: integer
    DeviceList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Device"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # ---------- Team ----------
    Team:
      type: object
      required: [id, name, isOwn, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        isOwn:
          type: boolean
        createdAt:
          type: string
          format: date-time
    CreateTeamRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        isOwn:
          type: boolean
          default: false
    UpdateTeamRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        isOwn:
          type: boolean
    TeamList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Team"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # ---------- Robot ----------
    Robot:
      type: object
      required: [id, teamId, name, version, primaryImageId, createdAt]
      properties:
        id:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        name:
          type: string
        version:
          type: string
          description: バージョン文字列。空文字列も可
        primaryImageId:
          type: [string, "null"]
          format: uuid
          description: 一覧サムネに使う画像 ID。未設定なら null
        createdAt:
          type: string
          format: date-time
    CreateRobotRequest:
      type: object
      required: [teamId, name]
      properties:
        teamId:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
        version:
          type: string
          default: ""
    UpdateRobotRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        version:
          type: string
    RobotList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Robot"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # ---------- Robot Image ----------
    RobotImage:
      type: object
      required:
        - id
        - robotId
        - contentType
        - sizeBytes
        - caption
        - capturedAt
        - createdAt
      properties:
        id: { type: string, format: uuid }
        robotId: { type: string, format: uuid }
        contentType:
          type: string
          description: 原本の MIME。HEIC のときも原本のまま入る
        width:
          type: [integer, "null"]
        height:
          type: [integer, "null"]
        sizeBytes: { type: integer, format: int64 }
        caption: { type: string }
        capturedAt:
          type: [string, "null"]
          format: date-time
          description: EXIF DateTimeOriginal。無い場合は null (UI 上は created_at にフォールバック)
        uploaderId:
          type: [string, "null"]
          format: uuid
        createdAt: { type: string, format: date-time }
    RobotImageList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/RobotImage" }
    UpdateRobotImageRequest:
      type: object
      properties:
        caption: { type: string }
        capturedAt:
          type: [string, "null"]
          format: date-time
    RobotImageUploadResult:
      type: object
      required: [filename]
      properties:
        filename: { type: string }
        image:
          $ref: "#/components/schemas/RobotImage"
        error:
          type: string
          description: そのファイルが失敗したとき、その理由
    RobotImageUploadResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/RobotImageUploadResult" }

    # ---------- Scenario ----------
    Scenario:
      type: object
      required: [id, name, description, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
    CreateScenarioRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          default: ""
    UpdateScenarioRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
    ScenarioList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Scenario"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # ---------- Tag ----------
    Tag:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: [string, "null"]
        createdAt:
          type: string
          format: date-time
    CreateTagRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: [string, "null"]
    UpdateTagRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: [string, "null"]
    TagList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # ---------- Session ----------
    Session:
      type: object
      required: [id, name, modeHint, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        startedAt:
          type: [string, "null"]
          format: date-time
        endedAt:
          type: [string, "null"]
          format: date-time
        location:
          type: [string, "null"]
        modeHint:
          $ref: "#/components/schemas/SessionModeHint"
        tournamentId:
          type: [string, "null"]
          format: uuid
        createdAt:
          type: string
          format: date-time
    CreateSessionRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        startedAt:
          type: [string, "null"]
          format: date-time
        endedAt:
          type: [string, "null"]
          format: date-time
        location:
          type: [string, "null"]
        modeHint:
          $ref: "#/components/schemas/SessionModeHint"
        tournamentId:
          type: [string, "null"]
          format: uuid
    UpdateSessionRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        startedAt:
          type: [string, "null"]
          format: date-time
        endedAt:
          type: [string, "null"]
          format: date-time
        location:
          type: [string, "null"]
        modeHint:
          $ref: "#/components/schemas/SessionModeHint"
        tournamentId:
          type: [string, "null"]
          format: uuid
    SessionList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Session"
        pagination:
          $ref: "#/components/schemas/Pagination"
    SessionCandidate:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [existing, new]
        session:
          $ref: "#/components/schemas/Session"
          description: type=existing のとき、候補となる既存 Session
        gapSec:
          type: [integer, "null"]
          description: 既存 Session との時間差（秒）。重なる場合は 0
        suggestedName:
          type: [string, "null"]
          description: type=new のとき、提案する Session 名
    SessionCandidateList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/SessionCandidate"

    # ---------- Video ----------
    Video:
      type: object
      required: [id, storageKey, displayName, timeOffsetSec, hasThumbnail, hlsStatus, createdAt]
      properties:
        id:
          type: string
          format: uuid
        sessionId:
          type: [string, "null"]
          format: uuid
        deviceId:
          type: [string, "null"]
          format: uuid
        uploaderId:
          type: [string, "null"]
          format: uuid
        storageKey:
          type: string
          description: オブジェクトストレージのキー
        displayName:
          type: string
          description: UI 表示用の名前。初期値はアップロード時のファイル名
        recordedAt:
          type: [string, "null"]
          format: date-time
        durationSec:
          type: [integer, "null"]
        timeOffsetSec:
          type: integer
          description: 個別オフセット（Device default に対する追加補正）
        hasThumbnail:
          type: boolean
          description: サムネイルが生成済みなら true。 GET /videos/{id}/thumbnail-url で取得
        hlsStatus:
          type: string
          description: |
            HLS 変換パイプラインの状態。`ready` のときのみ playback-url が
            HLS (kind=hls) を返す。それ以外は MP4 フォールバック。
          enum: [pending, planning, encoding, ready, failed]
        createdAt:
          type: string
          format: date-time
    UpdateVideoRequest:
      type: object
      properties:
        sessionId:
          type: [string, "null"]
          format: uuid
        deviceId:
          type: [string, "null"]
          format: uuid
        recordedAt:
          type: [string, "null"]
          format: date-time
        timeOffsetSec:
          type: integer
        displayName:
          type: string
    VideoList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Video"
        pagination:
          $ref: "#/components/schemas/Pagination"
    VideoRendition:
      type: object
      required:
        - id
        - videoId
        - kind
        - status
        - passthrough
        - width
        - height
        - playlistKey
        - segmentsDone
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        videoId:
          type: string
          format: uuid
        kind:
          type: string
          enum: [original, "720p", "480p"]
        status:
          type: string
          enum: [pending, encoding, ready, failed]
        passthrough:
          type: boolean
          description: |
            `-c copy` で再エンコードせず TS に remux しているなら true。
            original のみ true になり得る。
        width:
          type: integer
        height:
          type: integer
        bandwidthBps:
          type: [integer, "null"]
          description: master playlist で広告する BANDWIDTH 値
        playlistKey:
          type: string
        segmentsDone:
          type: integer
          description: これまでに S3 へアップロードされた .ts セグメント数
        error:
          type: [string, "null"]
        startedAt:
          type: [string, "null"]
          format: date-time
        completedAt:
          type: [string, "null"]
          format: date-time
        updatedAt:
          type: string
          format: date-time

    VideoRenditionList:
      type: object
      required: [videoId, hlsStatus, durationSec, data]
      properties:
        videoId:
          type: string
          format: uuid
        hlsStatus:
          type: string
          enum: [pending, planning, encoding, ready, failed]
        durationSec:
          type: [integer, "null"]
        data:
          type: array
          items:
            $ref: "#/components/schemas/VideoRendition"

    EncodingJob:
      type: object
      required: [video, renditions]
      properties:
        video:
          $ref: "#/components/schemas/Video"
        renditions:
          type: array
          items:
            $ref: "#/components/schemas/VideoRendition"

    EncodingJobList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/EncodingJob"

    PlaybackUrl:
      type: object
      required: [url, expiresAt, kind]
      properties:
        url:
          type: string
          format: uri
        expiresAt:
          type: string
          format: date-time
        kind:
          type: string
          description: |
            Playback source type. "hls" means an HLS master playlist served via
            the in-process proxy; "mp4" means the original upload served via a
            presigned S3 URL (used while HLS encoding is in progress or failed);
            "image" is used by the thumbnail endpoint.
          enum: [hls, mp4, image]

    # ---------- Tus hook ----------
    TusHookRequest:
      type: object
      required: [type, upload]
      properties:
        type:
          type: string
          description: tusd hook 種別（例 pre-finish / post-finish）
        upload:
          type: object
          required: [id, size, metaData]
          properties:
            id:
              type: string
              description: tusd の Upload ID
            size:
              type: integer
              description: バイト数
            offset:
              type: integer
            isFinal:
              type: boolean
            metaData:
              type: object
              additionalProperties:
                type: string
              description: |
                tus client から渡される metadata。期待するキー:
                `filename`, `filetype`, `deviceId`, `uploaderId`
            storage:
              type: object
              additionalProperties:
                type: string
              description: tusd S3 backend の保存先キーなど
    TusHookResponse:
      type: object
      properties:
        httpResponse:
          type: object
          description: tusd へのレスポンス指示（必要に応じて）
          properties:
            statusCode:
              type: integer
            body:
              type: string
            headers:
              type: object
              additionalProperties:
                type: string
        rejectUpload:
          type: boolean
          default: false
        videoId:
          type: [string, "null"]
          format: uuid
          description: 作成された Video の ID（デバッグ用）

    # ---------- Run ----------
    Run:
      type: object
      required: [id, sessionId, teamId, robotId, scenarioId, startedAt, endedAt, durationSec, memo, createdAt]
      description: |
        `endedAt` はサーバー側で `startedAt + durationSec` から計算したレスポンス専用の値で、更新時は `startedAt` と `durationSec` を渡す。
      properties:
        id:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        robotId:
          type: string
          format: uuid
        scenarioId:
          type: string
          format: uuid
        matchId:
          type: [string, "null"]
          format: uuid
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
        durationSec:
          type: integer
          minimum: 0
          description: Run のタイムライン長（秒）。プレイヤーはこの値を上限として表示する
        score:
          type: [number, "null"]
        memo:
          type: string
        videos:
          type: array
          description: getRun のみで埋まる。listRuns では省略
          items:
            $ref: "#/components/schemas/RunVideo"
        tagIds:
          type: array
          items:
            type: string
            format: uuid
        createdAt:
          type: string
          format: date-time
    CreateRunRequest:
      type: object
      required: [sessionId, teamId, robotId, scenarioId, startedAt]
      properties:
        sessionId:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        robotId:
          type: string
          format: uuid
        scenarioId:
          type: string
          format: uuid
        matchId:
          type: [string, "null"]
          format: uuid
        startedAt:
          type: string
          format: date-time
        durationSec:
          type: integer
          minimum: 0
        score:
          type: [number, "null"]
        memo:
          type: string
          default: ""
        tagIds:
          type: array
          items:
            type: string
            format: uuid
        videos:
          type: array
          description: 同時にアタッチする動画。Videos 画面の複数選択 → Run 作成で使う
          items:
            $ref: "#/components/schemas/AddRunVideoRequest"
    UpdateRunRequest:
      type: object
      properties:
        robotId:
          type: string
          format: uuid
        scenarioId:
          type: string
          format: uuid
        matchId:
          type: [string, "null"]
          format: uuid
        startedAt:
          type: string
          format: date-time
        durationSec:
          type: integer
          minimum: 0
        score:
          type: [number, "null"]
        memo:
          type: string
        tagIds:
          type: array
          items:
            type: string
            format: uuid
    RunList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Run"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # ---------- RunVideo ----------
    RunVideo:
      type: object
      required: [id, runId, videoId, videoOffsetStartSec, videoOffsetEndSec, runOffsetSec, angleLabel]
      properties:
        id:
          type: string
          format: uuid
        runId:
          type: string
          format: uuid
        videoId:
          type: string
          format: uuid
        videoOffsetStartSec:
          type: integer
          description: Source video 側で「Run の中で見せる」区間の開始秒
        videoOffsetEndSec:
          type: integer
          description: Source video 側で「Run の中で見せる」区間の終了秒
        runOffsetSec:
          type: integer
          minimum: 0
          description: Run タイムライン上でこの動画が登場する秒。0 なら Run 開始と同時
        angleLabel:
          type: string
          description: 例 "正面" / "コート横" / "drone"
    AddRunVideoRequest:
      type: object
      required: [videoId, videoOffsetStartSec, videoOffsetEndSec]
      properties:
        videoId:
          type: string
          format: uuid
        videoOffsetStartSec:
          type: integer
        videoOffsetEndSec:
          type: integer
        runOffsetSec:
          type: integer
          minimum: 0
          default: 0
        angleLabel:
          type: string
          default: ""
    UpdateRunVideoRequest:
      type: object
      properties:
        videoOffsetStartSec:
          type: integer
        videoOffsetEndSec:
          type: integer
        runOffsetSec:
          type: integer
          minimum: 0
        angleLabel:
          type: string

    # ---------- Marker ----------
    Marker:
      type: object
      required: [id, runId, runOffsetSec, label, category, createdAt]
      properties:
        id:
          type: string
          format: uuid
        runId:
          type: string
          format: uuid
        authorId:
          type: [string, "null"]
          format: uuid
        runOffsetSec:
          type: integer
          description: Run 開始からの秒数（spec §3.4）
        label:
          type: string
        category:
          $ref: "#/components/schemas/MarkerCategory"
        createdAt:
          type: string
          format: date-time
    CreateMarkerRequest:
      type: object
      required: [runOffsetSec, category]
      properties:
        runOffsetSec:
          type: integer
        label:
          type: string
          default: ""
        category:
          $ref: "#/components/schemas/MarkerCategory"
    UpdateMarkerRequest:
      type: object
      properties:
        runOffsetSec:
          type: integer
        label:
          type: string
        category:
          $ref: "#/components/schemas/MarkerCategory"
    MarkerList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Marker"
        pagination:
          $ref: "#/components/schemas/Pagination"
    TeamMarkerStats:
      type: object
      required: [teamId, success, failure, note]
      properties:
        teamId:
          type: string
          format: uuid
        success:
          type: integer
        failure:
          type: integer
        note:
          type: integer

    # ---------- Tournament (Phase 2) ----------
    Tournament:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        startDate:
          type: [string, "null"]
          format: date
        endDate:
          type: [string, "null"]
          format: date
        createdAt:
          type: string
          format: date-time
    CreateTournamentRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        startDate:
          type: [string, "null"]
          format: date
        endDate:
          type: [string, "null"]
          format: date
    UpdateTournamentRequest:
      type: object
      properties:
        name:
          type: string
        startDate:
          type: [string, "null"]
          format: date
        endDate:
          type: [string, "null"]
          format: date
    TournamentList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Tournament"
        pagination:
          $ref: "#/components/schemas/Pagination"

    TournamentTeamList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Team"
    ReplaceTournamentTeamsRequest:
      type: object
      required: [teamIds]
      properties:
        teamIds:
          type: array
          uniqueItems: true
          items:
            type: string
            format: uuid

    TournamentRobotList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Robot"
    ReplaceTournamentRobotsRequest:
      type: object
      required: [robotIds]
      properties:
        robotIds:
          type: array
          uniqueItems: true
          items:
            type: string
            format: uuid

    # ---------- Match (Phase 2) ----------
    Match:
      type: object
      required: [id, tournamentId, teamAId, teamBId, createdAt]
      properties:
        id:
          type: string
          format: uuid
        tournamentId:
          type: string
          format: uuid
        teamAId:
          type: string
          format: uuid
        teamBId:
          type: string
          format: uuid
        scheduledAt:
          type: [string, "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
    CreateMatchRequest:
      type: object
      required: [tournamentId, teamAId, teamBId]
      properties:
        tournamentId:
          type: string
          format: uuid
        teamAId:
          type: string
          format: uuid
        teamBId:
          type: string
          format: uuid
        scheduledAt:
          type: [string, "null"]
          format: date-time
    UpdateMatchRequest:
      type: object
      properties:
        teamAId:
          type: string
          format: uuid
        teamBId:
          type: string
          format: uuid
        scheduledAt:
          type: [string, "null"]
          format: date-time
    MatchList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Match"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # ---------- Annotation (Phase 2) ----------
    AnnotationType:
      type: string
      enum: [point, arrow, rect, path, text]
    Annotation:
      type: object
      required: [id, videoId, startOffsetSec, endOffsetSec, type, geometry, style, label, createdAt]
      properties:
        id:
          type: string
          format: uuid
        videoId:
          type: string
          format: uuid
        authorId:
          type: [string, "null"]
          format: uuid
        startOffsetSec:
          type: number
          description: 表示開始 (動画秒)
        endOffsetSec:
          type: number
          description: 表示終了 (動画秒)
        type:
          $ref: "#/components/schemas/AnnotationType"
        geometry:
          type: object
          additionalProperties: true
          description: |
            形状定義。type ごとに必要なキーが異なる:
            - point: { x: 0..1, y: 0..1 }
            - rect:  { x, y, w, h }      (すべて 0..1)
            - arrow: { x1, y1, x2, y2 }
            - path:  { points: [[x,y], ...] }
            - text:  { x, y, fontSize? }
        style:
          type: object
          additionalProperties: true
          description: 描画スタイル (色、線幅 等)
        label:
          type: string
        createdAt:
          type: string
          format: date-time
    CreateAnnotationRequest:
      type: object
      required: [startOffsetSec, endOffsetSec, type, geometry]
      properties:
        startOffsetSec:
          type: number
        endOffsetSec:
          type: number
        type:
          $ref: "#/components/schemas/AnnotationType"
        geometry:
          type: object
          additionalProperties: true
        style:
          type: object
          additionalProperties: true
        label:
          type: string
          default: ""
    UpdateAnnotationRequest:
      type: object
      properties:
        startOffsetSec:
          type: number
        endOffsetSec:
          type: number
        geometry:
          type: object
          additionalProperties: true
        style:
          type: object
          additionalProperties: true
        label:
          type: string
    AnnotationList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Annotation"

    # ---------- ScoutingNote (Phase 2) ----------
    ScoutingNote:
      type: object
      required: [id, matchId, targetTeamId, plainText, updatedAt, createdAt]
      properties:
        id:
          type: string
          format: uuid
        matchId:
          type: string
          format: uuid
        targetTeamId:
          type: string
          format: uuid
        plainText:
          type: string
          description: Hocuspocus が yjs ドキュメントから派生して書き込む検索用テキスト
        updatedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    CreateScoutingNoteRequest:
      type: object
      required: [targetTeamId]
      properties:
        targetTeamId:
          type: string
          format: uuid
    ScoutingNoteList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ScoutingNote"
