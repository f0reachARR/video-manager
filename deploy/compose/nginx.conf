worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;

  server_tokens off;

  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent"';
  access_log /dev/stdout main;
  error_log  /dev/stderr warn;

  # WebSocket upgrade map: leave Connection alone for non-WS requests so
  # idle keepalive isn't disrupted, but switch to "upgrade" when the client
  # asks for a WS upgrade. Used by /api (real-time pub/sub) and /hocuspocus.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream vm_api        { server api:8080;        keepalive 16; }
  upstream vm_tusd       { server tusd:1080;       keepalive 16; }
  upstream vm_hocuspocus { server hocuspocus:1234; keepalive 16; }

  server {
    listen 80 default_server;
    server_name _;

    # tus uploads stream chunks straight through; don't cap body size, and
    # disable request buffering on the upload + API paths.
    client_max_body_size 0;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_buffering off;

    # Long-running streams (HLS proxy, WS, tus chunks). Keep these generous;
    # the SPA opens persistent WS connections for live run updates.
    proxy_read_timeout  1h;
    proxy_send_timeout  1h;
    send_timeout        1h;

    # Forwarded headers — Go API reads X-Forwarded-* via chi middleware,
    # tusd uses them with -behind-proxy.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # Go API. Strip the /api/ prefix; chi mounts /users, /videos, /ws/...
    # at root, the SPA calls them via "/api" (see web/src/lib/api/client.ts).
    location /api/ {
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_pass http://vm_api/;
    }

    # tus uploads. tusd is configured with -base-path=/files/, so preserve
    # the path verbatim (no trailing slash on proxy_pass).
    location /files/ {
      proxy_pass http://vm_tusd;
    }

    # Hocuspocus collab WS. SPA connects to wss://<host>/hocuspocus; the
    # server itself listens at the root, so strip the /hocuspocus prefix.
    location = /hocuspocus {
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_pass http://vm_hocuspocus/;
    }
    location /hocuspocus/ {
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_pass http://vm_hocuspocus/;
    }

    # SPA static assets. Precache fingerprinted bundles aggressively; never
    # cache index.html so SW + new releases roll out without stale shells.
    root /usr/share/nginx/html;
    index index.html;

    location = /index.html {
      add_header Cache-Control "no-store" always;
      try_files $uri =404;
    }

    location /assets/ {
      access_log off;
      expires 1y;
      add_header Cache-Control "public, immutable" always;
      try_files $uri =404;
    }

    # SPA fallback — TanStack Router handles in-app paths client-side.
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
