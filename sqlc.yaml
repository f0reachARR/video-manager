version: "2"
sql:
  - engine: postgresql
    queries: internal/db/query
    schema: migrations
    gen:
      go:
        package: sqlc
        out: internal/db/sqlc
        sql_package: pgx/v5
        emit_json_tags: false
        emit_pointers_for_null_types: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        rename:
          session_mode_hint: SessionModeHint
          marker_category: MarkerCategory
          annotation_type: AnnotationType
          hls_status: HLSStatus
          rendition_kind: RenditionKind
          rendition_status: RenditionStatus
