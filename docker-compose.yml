services:
  # --- Optional infra: Postgres ----------------------------------------------
  # Gated behind the "internal-postgres" profile. Active by default via
  # COMPOSE_PROFILES in .env. Set DATABASE_URL to an external host and drop
  # the profile from COMPOSE_PROFILES to use a managed Postgres instead.
  postgres:
    image: postgres:16
    profiles: ["internal-postgres"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-video}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-video}
      POSTGRES_DB: ${POSTGRES_DB:-video_manager}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/compose/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-video} -d ${POSTGRES_DB:-video_manager}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Optional infra: S3 (MinIO) --------------------------------------------
  # Gated behind the "internal-s3" profile. Drop it from COMPOSE_PROFILES and
  # point S3_ENDPOINT / S3_BUCKET / S3_ACCESS_KEY / S3_SECRET_KEY at AWS S3
  # (or another MinIO) to use external object storage.
  minio:
    image: minio/minio:latest
    profiles: ["internal-s3"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 6

  # One-shot: ensure the video bucket exists. Idempotent.
  minio-init:
    image: minio/mc:latest
    profiles: ["internal-s3"]
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
      MINIO_BUCKET: ${MINIO_BUCKET:-videos}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$$MINIO_BUCKET"
        echo "bucket ready: $$MINIO_BUCKET"

  # --- Always-on infra: tusd + hocuspocus ------------------------------------
  tusd:
    image: tusproject/tusd:v2.5
    restart: unless-stopped
    depends_on:
      minio-init:
        condition: service_completed_successfully
        required: false
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-${MINIO_ROOT_USER:-minio}}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minio123}}
      AWS_REGION: ${S3_REGION:-us-east-1}
    command:
      - -port=1080
      - -base-path=/files/
      - -s3-bucket=${MINIO_BUCKET:-${S3_BUCKET:-videos}}
      - -s3-endpoint=${S3_ENDPOINT_INTERNAL:-${S3_ENDPOINT:-http://minio:9000}}
      - -hooks-http=${TUSD_HOOK_URL:-http://api:8080/uploads/tus-hook}
      - -hooks-enabled-events=post-finish
      - -cors-allow-origin=${ALLOWED_ORIGINS:-http://localhost:5173}
      # Expose the API's post-finish header so bulk-upload UIs can read
      # the created video id straight off the tus completion response.
      - -cors-expose-headers=Upload-Offset,Location,Upload-Length,Tus-Version,Tus-Resumable,Tus-Max-Size,Tus-Extension,Upload-Metadata,Upload-Defer-Length,Upload-Concat,X-Video-Id
      - -behind-proxy
    ports:
      - "${TUSD_PORT:-1080}:1080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  hocuspocus:
    build:
      context: ./hocuspocus
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL_INTERNAL:-${DATABASE_URL:-postgres://${POSTGRES_USER:-video}:${POSTGRES_PASSWORD:-video}@postgres:5432/${POSTGRES_DB:-video_manager}?sslmode=disable}}
      HOCUSPOCUS_PORT: "1234"
    ports:
      - "${HOCUSPOCUS_PORT:-1234}:1234"

  # External hls-worker. Connects only to the API (over HTTP) and to the
  # object store (S3 / MinIO). It does NOT need DB credentials. Scale out
  # with `docker compose up --scale worker=N` — each replica long-polls the
  # API's /internal/worker/jobs/claim endpoint, so the API's in-memory
  # dispatcher fairly distributes work.
  worker:
    build:
      context: .
      dockerfile: deploy/docker/app.Dockerfile
    entrypoint: ["/app/hls-worker"]
    restart: unless-stopped
    depends_on:
      minio-init:
        condition: service_completed_successfully
        required: false
    environment:
      API_BASE_URL: ${API_BASE_URL_INTERNAL:-http://api:8080}
      WORKER_AUTH_TOKEN: ${WORKER_AUTH_TOKEN:-}
      WORKER_QUEUES: ${WORKER_QUEUES_REMOTE:-probe,encode}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
      S3_ENDPOINT: ${S3_ENDPOINT_INTERNAL:-${S3_ENDPOINT:-http://minio:9000}}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-${MINIO_BUCKET:-videos}}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-${MINIO_ROOT_USER:-minio}}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minio123}}
      S3_USE_PATH_STYLE: "true"

  # --- App tier (Go API + nginx + SPA) ---------------------------------------
  # Gated behind the "app" profile so the legacy host-mode dev workflow
  # (./scripts/dev.sh + vite on 5173) keeps working unchanged. Enable with
  # COMPOSE_PROFILES=internal-postgres,internal-s3,app for a fully containerized
  # deployment behind nginx on ${NGINX_PORT:-80}.
  api:
    build:
      context: .
      dockerfile: deploy/docker/app.Dockerfile
    profiles: ["app"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      minio-init:
        condition: service_completed_successfully
        required: false
    environment:
      HTTP_ADDR: ":8080"
      APP_VERSION: ${APP_VERSION:-0.1.0}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      DATABASE_URL: ${DATABASE_URL_INTERNAL:-${DATABASE_URL:-postgres://${POSTGRES_USER:-video}:${POSTGRES_PASSWORD:-video}@postgres:5432/${POSTGRES_DB:-video_manager}?sslmode=disable}}
      S3_ENDPOINT: ${S3_ENDPOINT_INTERNAL:-${S3_ENDPOINT:-http://minio:9000}}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-${MINIO_BUCKET:-videos}}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-${MINIO_ROOT_USER:-minio}}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minio123}}
      S3_USE_PATH_STYLE: ${S3_USE_PATH_STYLE:-true}
      S3_PRESIGN_TTL: ${S3_PRESIGN_TTL:-10m}
      # Browser-reachable URL for presigned GETs. Defaults to S3_ENDPOINT
      # (which is the host-port value in .env.example: http://localhost:9000),
      # so internal MinIO + dockerized API still hands the browser URLs it
      # can resolve. With external S3 leave this empty.
      S3_PRESIGN_ENDPOINT: ${S3_PRESIGN_ENDPOINT:-${S3_ENDPOINT:-}}
      HLS_BASE_URL: ${HLS_BASE_URL:-}
      WORKER_QUEUES: ${API_WORKER_QUEUES:-default,encode}
      WORKER_CONCURRENCY_DEFAULT: ${WORKER_CONCURRENCY_DEFAULT:-4}
      WORKER_CONCURRENCY_ENCODE: ${WORKER_CONCURRENCY_ENCODE:-4}
      WORKER_AUTH_TOKEN: ${WORKER_AUTH_TOKEN:-}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URL: ${OIDC_REDIRECT_URL:-}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid,profile,email}
      OIDC_POST_LOGOUT_URL: ${OIDC_POST_LOGOUT_URL:-/}
      SESSION_SECRET: ${SESSION_SECRET:-}
      SESSION_MAX_AGE: ${SESSION_MAX_AGE:-168h}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      AUTH_DEV_BYPASS: ${AUTH_DEV_BYPASS:-false}

  nginx:
    build:
      context: .
      dockerfile: deploy/docker/nginx.Dockerfile
    profiles: ["app"]
    restart: unless-stopped
    depends_on:
      - api
      - tusd
      - hocuspocus
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./deploy/compose/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres-data:
  minio-data:
