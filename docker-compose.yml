services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-video}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-video}
      POSTGRES_DB: ${POSTGRES_DB:-video_manager}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/compose/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-video} -d ${POSTGRES_DB:-video_manager}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 6

  # One-shot: ensure the video bucket exists. Idempotent.
  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
      MINIO_BUCKET: ${MINIO_BUCKET:-videos}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$$MINIO_BUCKET"
        echo "bucket ready: $$MINIO_BUCKET"

  tusd:
    image: tusproject/tusd:v2.5
    restart: unless-stopped
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      AWS_REGION: ${S3_REGION:-us-east-1}
    command:
      - -port=1080
      - -base-path=/files/
      - -s3-bucket=${MINIO_BUCKET:-videos}
      - -s3-endpoint=http://minio:9000
      - -hooks-http=${TUSD_HOOK_URL:-http://host.docker.internal:8080/uploads/tus-hook}
      - -hooks-enabled-events=post-finish
      - -cors-allow-origin=${ALLOWED_ORIGINS:-http://localhost:5173}
      - -behind-proxy
    ports:
      - "${TUSD_PORT:-1080}:1080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres-data:
  minio-data:
